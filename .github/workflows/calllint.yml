name: CallLint

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: read the repo, write Code Scanning alerts only.
permissions:
  contents: read
  security-events: write

jobs:
  calllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # CallLint never executes the servers it scans — this is a static,
      # offline pre-flight check of the MCP config.
      # --sarif / --html print to stdout and exit 0; only the gate step below
      # uses --ci to fail the run. No `|| true` here — a real failure should show.
      - name: Scan MCP config (SARIF for Code Scanning)
        run: npx calllint scan .cursor/mcp.json --sarif > calllint.sarif

      - name: Scan MCP config (self-contained HTML report)
        run: npx calllint scan .cursor/mcp.json --html > calllint.html

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: calllint.sarif
          category: calllint

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: calllint-html-report
          path: calllint.html

      # Report-only here so this demo's run stays green while the risk signal
      # shows up as Code Scanning alerts. In a real repo, delete
      # `continue-on-error` to fail PRs on BLOCK (exit 30) / UNKNOWN (exit 20).
      - name: Policy gate (report-only in this demo)
        continue-on-error: true
        run: npx calllint scan .cursor/mcp.json --ci --no-emoji

